<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />

		<!-- Mobile tweaks -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Code">
		<link rel="apple-touch-icon" href="/code-192.png" />

		<!-- Disable pinch zooming -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

		<!-- Workbench Icon/Manifest/CSS -->
		<link rel="icon" href="/favicon.ico" type="image/x-icon" />
		<link rel="manifest" href="/manifest.json">
		<link data-name="vs/workbench/workbench.web.main" rel="stylesheet" href="./depend/vscode-web/dist/out/vs/workbench/workbench.web.main.css">

	</head>

	<body aria-label="">
	</body>

	<!-- Register COOP/COEP Service Worker for SharedArrayBuffer support -->
	<script>
		if ("serviceWorker" in navigator) {
			navigator.serviceWorker.register("./sw.js").then(
				function (registration) {
					if (registration.active && !navigator.serviceWorker.controller) {
						window.location.reload();
					}
				},
				function (err) {
					console.warn("COOP/COEP Service Worker failed to register", err);
				}
			);
		} else {
			console.warn("Service workers not supported; SharedArrayBuffer may be unavailable");
		}
	</script>

	<!-- Startup (do not modify order of script tags!) -->
	<script src="./depend/vscode-web/dist/out/vs/loader.js"></script>
	<script src="./depend/vscode-web/dist/out/vs/webPackagePaths.js"></script>
	<script>
		Object.keys(self.webPackagePaths).map(function (key, index) {
			self.webPackagePaths[key] = `${window.location.origin + window.location.pathname}/depend/vscode-web/dist/depend/${key}/${self.webPackagePaths[key]}`;
		});
		require.config({
			baseUrl: `${window.location.origin + window.location.pathname}/depend/vscode-web/dist/out`,
			recordStats: true,
			trustedTypesPolicy: window.trustedTypes?.createPolicy('amdLoader', {
				createScriptURL(value) {
					return value;
				}
			}),
			paths: self.webPackagePaths
		});
	</script>
	<script src="./depend/vscode-web/dist/out/vs/workbench/workbench.web.main.nls.js"></script>
	<script src="./depend/vscode-web/dist/out/vs/workbench/workbench.web.main.js"></script>
	<script src="./depend/vscode-web/dist/out/vs/code/browser/workbench/workbench.js"></script>
</html>
