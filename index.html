<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />

		<!-- Mobile tweaks -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Code">

		<!-- Disable pinch zooming -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

		<!-- Workbench Icon/Manifest/CSS -->
		<link rel="icon" href="/favicon.ico" type="image/x-icon" />
		<link rel="manifest" href="/manifest.json">
		<link data-name="vs/workbench/workbench.web.main" rel="stylesheet" href="./depend/@liudonghua123/vscode-web/dist/out/vs/workbench/workbench.web.main.css">

	</head>

	<body aria-label="">
	</body>

	<!-- Startup (do not modify order) -->
	<script src="./depend/@liudonghua123/vscode-web/dist/out/vs/loader.js"></script>
	<script>
		require.config({
			baseUrl: `${window.location.origin}/depend/@liudonghua123/vscode-web/dist/out`,
			recordStats: true,
			trustedTypesPolicy: window.trustedTypes?.createPolicy('amdLoader', {
				createScriptURL(value) {
					return value;
				}
			})
		});
	</script>
	<script src="./depend/@liudonghua123/vscode-web/dist/out/vs/workbench/workbench.web.main.js"></script>
	<script>
		fetch('./product.json').then(r => r.json()).then(product => {
			require(['vs/workbench/workbench.web.main'], function (api) {
				api.create(document.body, product);
			});
		});
	</script>
</html>
