name: Sync examples

on:
  workflow_dispatch:  # manual trigger: gh workflow run sync-examples.yml
  schedule:
    - cron: '0 8 * * 1'  # every Monday 8am UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodule to latest
        run: git submodule update --remote

      - name: Embed examples into extension.js
        run: node sync_examples.js

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync typort examples from submodule [skip ci]"
          git push
