name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-06-06
          target: wasm32-wasip1-threads

      - name: Build project
        run: |
          sh ./run.sh
          cd sample/
          npm install
          mv node_modules depend
          mv depend/vscode-web/dist/node_modules depend/vscode-web/dist/depend

      - name: Patch product.json for Cloudflare Pages
        run: |
          cd sample/
          sed -i 's|"scheme": "http"|"scheme": "https"|g' product.json
          sed -i 's|"authority": "localhost:8080"|"authority": "dependent-type-web-lsp.pages.dev"|g' product.json

      - name: Strip Service Worker (Cloudflare uses _headers instead)
        run: |
          cd sample/
          sed -i '/<!-- Register COOP\/COEP/,/<\/script>/d' index.html
          rm -f sw.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sample
